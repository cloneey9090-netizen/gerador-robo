name: Fabrica de APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Flet
        run: |
          pip install --upgrade pip
          pip install flet

      - name: Compilar o APK
        run: |
          flet build apk --module-name robo

      - name: Disponibilizar o APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: meu-robo-apk
          path: build/apk/app-release.apk
